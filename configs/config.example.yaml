# ATLAS Configuration Example
# Copy this file to config.yaml and fill in your settings

server:
  host: "0.0.0.0"
  port: 8080
  mode: "release"  # release, debug
  api_key: "${ATLAS_API_KEY}"  # API key for REST API authentication (leave empty to disable)
  job_ttl_hours: 1             # How long to keep async job results
  max_jobs: 100                # Maximum concurrent async jobs

log:
  level: "info"  # debug, info, warn, error
  format: "json" # json, console

# Data collectors for market data
collectors:
  yahoo:
    enabled: true
    markets: ["US", "HK"]
    interval: "5m"
  eastmoney:
    enabled: true
    markets: ["CN_A"]
    interval: "30s"
  # Lixinger API for CN fundamental data
  lixinger:
    enabled: false
    api_key: "${LIXINGER_API_KEY}"
    markets: ["CN_A"]
    interval: "24h"
    retry: true   # 429/5xx 退避重试（1/2/4/8/16s，最多5次）；设 false 关闭
  # FRED API for macro crisis monitor (Cassandra); env FRED_API_KEY overrides
  fred:
    enabled: false
    api_key: "${FRED_API_KEY}"

# Trading strategies
strategies:
  # Technical strategies
  ma_crossover:
    enabled: true
    params:
      fast_period: 50
      slow_period: 200
      ma_type: "sma"  # sma, ema
  # Fundamental strategies
  pe_band:
    enabled: false
  # Historical-percentile strategies (price / PE position in own multi-year range)
  price_percentile:
    enabled: true
    params: {lookback_years: 5, low: 25, high: 75, extreme_low: 10, extreme_high: 90, percentile_step: 5}  # 按策略覆盖全局步长
    # lookback_years: 0  # 0 = 自上市/起始日全历史（不配则默认 5 年）
  pe_percentile:
    enabled: true
    params: {lookback_years: 5, low: 20, high: 80, extreme_low: 10, extreme_high: 90, percentile_step: 5}  # 按策略覆盖全局步长
    # lookback_years: 0  # 0 = 自上市/起始日全历史（不配则默认 5 年）
  dividend_yield:
    enabled: false
    params:
      min_yield: 3.0
      min_payout_years: 5
      max_payout_ratio: 80

# Valuation lookback configuration
# lookback_years 控制 PE/价格分位的历史窗口；默认 5（与 strategies 默认一致，零回归）。
# 设为 0 = 自上市/起始日全历史（inception）。
# 启用全史回看需**同时**把 strategies.price_percentile.params.lookback_years、
# strategies.pe_percentile.params.lookback_years 与 valuation.lookback_years 都设为 0；
# 只设其一会导致价格窗口与 PE/EPS 窗口不一致。
# 注意：A 股个股 + 所有指数走理杏仁(lixinger)，其 PE 分位上限 10 年(y10)，
# inception(0) 对这些标的等价"最多 10 年"，非真全史；美/港个股走 yahoo EPS 重建，可真到上市日。
valuation:
  lookback_years: 5   # PE 分位 lookback；默认 5（细节见上方注释，0=自上市起）。

# 本地 qlib 数据仓库（方向③）：以本地 SQLite 历史库为权威主源，外部 API 仅补
# 「仓库最后一天→今日」的新鲜尾巴；缺库/损坏/enabled:false 时自动回落纯外部 API
# （零行为变化）。库由 `make warehouse-dump` 生成，运维见 docs/ops/qlib-warehouse-runbook.md。
# 整段缺省即等同 enabled:false。
qlib:
  enabled: false                    # true 才挂仓库；false/缺省 → 纯外部 API
  db_path: "data/qlib_warehouse.db" # 与 Makefile WAREHOUSE_DB 一致
  max_staleness_days: 7             # last_date 超过该天数仅记 warning，仍服务（默认 7）
  conn_max_lifetime: 10m            # 只读连接回收周期：每日重建（os.replace）后无需重启
                                    # atlas 即可读到新库，最多滞后该时长（<=0 用默认 10m）

# Signal routing
router:
  min_confidence: 0.6
  cooldown_hours: 4      # 0 = 禁用冷却；仅约束不带分位元数据的策略信号
  percentile_step: 5     # 全局默认步长；策略 params.percentile_step 优先（0 = 禁用）
  batch_notify: true     # true=一轮信号汇总成一条表格消息(digest)；false=每条信号即时单发

# Notification channels.
# 仅 enabled: true 的通知器才会接线；必填字段缺失时启动 warn 并跳过该通知器
# （不阻断服务）。若所有 enabled 的通知器都注册失败，启动额外 warn 告警信号不会外发。
notifiers:
  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"   # 必填
    chat_id: "${TELEGRAM_CHAT_ID}"       # 必填（telegram 必填: bot_token + chat_id，缺失则 warn 并跳过）
    proxy: ""                            # 可选：api.telegram.org 不可直达时走代理，
                                         # 如 "http://127.0.0.1:7890" 或 "socks5://127.0.0.1:1080"；
                                         # 仅作用于 telegram 投递，行情采集器保持直连。空=直连
  email:
    enabled: false
    host: "smtp.gmail.com"               # 必填
    port: 587
    username: "${EMAIL_USERNAME}"
    password: "${EMAIL_PASSWORD}"
    from: "ATLAS <atlas@example.com>"     # 必填
    to:
      - "user@example.com"               # 必填（至少 1 个收件人；email 必填: host + from + to，缺失则 warn 并跳过）
  webhook:
    enabled: false
    url: "https://example.com/atlas-webhook"  # 必填（webhook 必填: url，缺失则 warn 并跳过）
    headers:
      Authorization: "Bearer ${WEBHOOK_TOKEN}"

# Storage configuration
storage:
  # Hot storage (recent data, fast access)
  hot:
    dsn: ""  # Empty for in-memory, or PostgreSQL DSN: "postgres://user:pass@localhost:5432/atlas"
    retention_days: 90
  # Cold storage (archived data)
  cold:
    type: "localfs"  # localfs, s3
    path: "./data/archive"
    s3:
      bucket: "atlas-archive"
      endpoint: "https://s3.amazonaws.com"
      region: "us-east-1"
      access_key: "${AWS_ACCESS_KEY_ID}"
      secret_key: "${AWS_SECRET_ACCESS_KEY}"
      prefix: "atlas/"
  # Generated-signal store (feeds the API and web UI).
  # ⚠️ 行为变化：默认从「内存」改为「sqlite」——信号默认持久化落盘到
  # data/signals.db，重启后不再丢失。如需旧的非持久化行为，显式设 backend: memory。
  # sqlite 打开失败时服务启动即退出（不静默降级内存，避免悄悄丢数据）。
  signals:
    backend: "sqlite"        # sqlite（默认，持久化）| memory（进程内，重启即丢）
    path: "data/signals.db"  # sqlite 数据库路径（backend=sqlite 时生效；父目录自动创建）

# LLM configuration
llm:
  provider: "claude"  # claude, openai, ollama
  claude:
    api_key: "${ANTHROPIC_API_KEY}"
    model: "claude-sonnet-4-20250514"
    proxy: ""   # 可选：api.anthropic.com 不可直达时走代理（仲裁器用），
                # 如 "http://127.0.0.1:7890"；空=直连。不可达时仲裁降级为直接路由原始信号
  openai:
    api_key: "${OPENAI_API_KEY}"
    model: "gpt-4o"
  ollama:
    endpoint: "http://localhost:11434"
    model: "qwen2.5:32b"

# LLM meta-strategies
meta:
  arbitrator:
    enabled: true
    context_days: 7  # Days of news/context for arbitration
  synthesizer:
    enabled: false
    schedule: "0 0 * * 0"  # Cron: weekly on Sunday midnight
    min_trades: 50          # Minimum trades required for analysis

# Broker integration
broker:
  enabled: false
  provider: "mock"  # mock (paper-only; live trading not supported)
  mode: "paper"     # paper only
  execution:
    mode: "confirm"       # auto, confirm, batch
    batch_time: "09:00"   # For batch mode (HH:MM)
    default_size_pct: 2   # 2% of portfolio per position
  risk:
    max_position_pct: 10      # Max 10% in single position
    max_daily_loss_pct: 5     # Stop trading if down 5% today
    max_open_positions: 20    # Max concurrent positions

# Watchlist of symbols to monitor
watchlist:
  - symbol: "AAPL"
    name: "Apple Inc"
    strategies: ["ma_crossover"]
  - symbol: "MSFT"
    name: "Microsoft Corp"
    strategies: ["ma_crossover"]
  - symbol: "600519.SH"
    name: "Kweichow Moutai"
    strategies: ["ma_crossover", "pe_band", "dividend_yield"]
  - symbol: "0700.HK"
    name: "Tencent Holdings"
    strategies: ["ma_crossover"]
  # Index / commodity / crypto examples for the percentile strategies
  - {symbol: "^GSPC",    name: "标普500",   type: "指数",     strategies: [price_percentile, pe_percentile]}
  - {symbol: "GC=F",     name: "COMEX黄金", type: "期货",     strategies: [price_percentile]}
  - {symbol: "BTC-USDT", name: "比特币",    type: "加密货币", strategies: [price_percentile]}

# Metrics configuration (Prometheus)
metrics:
  enabled: true
  path: "/metrics"

# Alerting configuration.
# The evaluation loop (started only when enabled) snapshots metrics every
# check_interval, derives a couple of alert-friendly metrics, and evaluates the
# rules below. Rule expr must reference a metric the snapshot produces:
#   http_error_rate  — interval 5xx-over-total request error rate (0..1), derived
#                       from the delta of http_requests_total_5xx / http_requests_total
#                       between two snapshots (first snapshot has no baseline).
#   signals_24h      — number of signals stored in the last 24h.
# Plus any raw key from /metrics (e.g. atlas_signals_generated_total). Note HTTP
# metric names have no atlas_ prefix; business metrics do.
alerts:
  enabled: true
  check_interval: 60s
  rules:
    - name: high_error_rate
      expr: "http_error_rate > 0.1"
      for: 5m
      severity: warning
      message: "API 5xx error rate above 10% over the last interval"

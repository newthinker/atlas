  - {symbol: "000932.SH",  name: "中证主要消费",   type: "指数", strategies: [price_percentile, pe_percentile]}
  - {symbol: "000922.SH",  name: "中证红利",       type: "指数", strategies: [price_percentile, pe_percentile]}
  - {symbol: "930713.CSI", name: "中证人工智能",   type: "指数", strategies: [price_percentile, pe_percentile]}
